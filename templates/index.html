<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ARP Device Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <h1>ARP Device Dashboard</h1>
    <form id="configForm">
  <label>
    CIDR
    <input id="cidrInput" type="text" placeholder="192.168.1.0/24" />
  </label>

  <label>
    Interface
    <input id="ifaceInput" type="text" placeholder="Ethernet" />
  </label>

  <label>
    Interval (sec)
    <input id="intervalInput" type="number" min="1" step="1" />
  </label>

  <button type="submit">Apply</button>
  <span id="configStatus"></span>
</form>


    <a href="/api/export.csv">Download CSV</a>
    <a href="/api/export.json">Download JSON</a>

    <div class="grid">
      <div>
        <h2>Devices</h2>
        <table id="devices">
          <thead>
            <tr>
              <th>Status</th><th>IP</th><th>MAC</th><th>First Seen</th><th>Last Seen</th><th>Misses</th><th>Vendor</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div>
        <h2>Events</h2>
        <ul id="events"></ul>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
