<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ARP Device Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <h1>ARP Device Dashboard</h1>

    <div class="grid">
      <div>
        <h2>Devices</h2>
        <table id="devices">
          <thead>
            <tr>
              <th>Status</th><th>IP</th><th>MAC</th><th>First Seen</th><th>Last Seen</th><th>Misses</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div>
        <h2>Events</h2>
        <ul id="events"></ul>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
